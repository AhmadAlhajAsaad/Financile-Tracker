{% extends "base.html" %}
{% block title %}Registreren — FinTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center"><i class="fa-solid fa-user-plus me-2"></i>Registreren</h2>
        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="mb-3">
            <label for="username" class="form-label">Gebruikersnaam</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-mailadres</label>
            <input type="email" class="form-control" id="email" name="email" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Wachtwoord</label>
            <input type="password" class="form-control" id="password" name="password" required />
            <div class="form-text">Minimaal 8 tekens, 1 hoofdletter en 1 cijfer.</div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Account aanmaken</button>
          </div>
        </form>
        <hr />
        <p class="text-center mb-0">Al een account? <a href="{{ url_for('auth.login') }}">Inloggen</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
